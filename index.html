<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Раскраска</title>
    <style>
        /* Здесь находится CSS (внешний вид) */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background-color: white;
            cursor: crosshair;
            max-width: 95vw;
            max-height: 80vh;
        }
        .controls {
            margin-top: 20px;
        }
        input[type="color"] {
            width: 50px;
            height: 50px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Здесь находится HTML (структура) -->
    <canvas id="paintCanvas"></canvas>

    <div class="controls">
        <input type="color" id="colorPicker" value="#ff0000">
        <button onclick="clearCanvas()">Очистить</button>
    </div>

    <script>
        // Здесь находится JavaScript (логика/движение)
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');

        // Настройки размера холста
        canvas.width = 500;
        canvas.height = 500;

        let painting = false;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;

            // Получаем координаты клика с учетом масштаба
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Слушатели для мышки
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Слушатели для сенсорного экрана (телефоны)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e.touches[0]); });


canvas.addEventListener('touchend', finishedPosition); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>
